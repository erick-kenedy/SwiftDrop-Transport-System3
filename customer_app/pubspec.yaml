name: customer_app
description: SwiftDrop Customer Mobile Application
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  shared_preferences: ^2.1.0
  geolocator: ^9.0.2
  google_maps_flutter: ^2.2.5
  google_maps_webservice: ^3.0.0+20220712
  provider: ^6.0.0
  intl: ^0.18.1
  flutter_rating_bar: ^4.0.1
  image_picker: ^0.8.7+1
  permission_handler: ^11.4.2
  socket_io_client: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_linter: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
